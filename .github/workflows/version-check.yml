name: Check for new ServiceNow release versions

on:
  schedule:
    - cron: '0 0 1 * *'  # First of every month
  workflow_dispatch:      # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for new release versions
        id: check
        run: |
          output=$(node scripts/check-versions.mjs 2>&1)
          echo "$output"
          if echo "$output" | grep -q "New releases found:"; then
            echo "new_versions=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if new versions found
        if: steps.check.outputs.new_versions == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/add-release-versions-$(date +%Y%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/docs-client.ts
          git commit -m "chore: add newly detected ServiceNow release versions to allowlist"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: add newly detected ServiceNow release versions" \
            --base main \
            --head "$BRANCH" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automated monthly check detected new ServiceNow release name(s) in docs URLs
          - Updated \`KNOWN_RELEASES\` allowlist in \`src/docs-client.ts\`

          ## Test plan
          - [ ] Verify the new release names look correct (city names, not product areas)
          - [ ] Confirm unit tests still pass after merge

          🤖 Generated by the version-check workflow
          EOF
          )"
